name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    environment: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm stage publish --filter './packages/*' --no-git-checks
