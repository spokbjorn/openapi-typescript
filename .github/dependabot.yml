# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"

  - package-ecosystem: npm
    directory: /examples/axios
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /examples/generator
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /packages/axios-openapi-typescript
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /packages/vite-plugin-openapi-typescript
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /tools/eslint-config
    schedule:
      interval: weekly
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@stylistic/*"
          - "typescript-eslint"

  - package-ecosystem: npm
    directory: /tools/tsconfig
    schedule:
      interval: weekly
