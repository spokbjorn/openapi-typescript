packages:
  - 'packages/*'
  - 'examples/*'
  - 'tools/*'

allowBuilds:
  esbuild: false

minimumReleaseAge: 2880

trustPolicy: no-downgrade
trustPolicyExclude:
  - 'chokidar'

savePrefix: ''

catalogMode: strict
cleanupUnusedCatalogs: true
catalog:
  husky: "9.1.7"
  lint-staged: "17.0.7"

  typescript: "5.9.3"
  tsup: "8.5.1"
  vite: "8.0.16"
  vitest: "4.1.9"

  "@types/node": "26.0.0"

  axios: "1.18.0"

  openapi-typescript: "7.13.0"
  openapi-typescript-helpers: "0.1.0"
  openapi-fetch: "0.17.0"

  eslint: "10.4.1"
  "@eslint/js": "10.0.1"
  "@stylistic/eslint-plugin": "5.10.0"
  typescript-eslint: "8.61.0"
